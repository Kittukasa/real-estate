server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ────────────────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Angular SPA routing  ────────────────────────────────────────────────────
    # Any URL that doesn't map to a real file falls back to index.html
    # This lets Angular's client-side router handle /properties/123, etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache-bust hashed static assets ────────────────────────────────────────
    # Angular appends content hashes to JS/CSS filenames (e.g. main.abc123.js)
    # so these can be cached aggressively in the browser
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── ALB health check ────────────────────────────────────────────────────────
    # ALB pings /health every 30 s; return 200 without hitting disk
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
        access_log off;
    }
}
